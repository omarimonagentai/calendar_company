{"year":2027,"country":"Portugal","city":"Lisboa","date":"2027-12-01","name_en":"Restoration of Independence","name_local":"Restauração da Independência","type":"Nacional","category":"national","notes":""},
{"year":2027,"country":"Portugal","city":"Lisboa","date":"2027-12-08","name_en":"Immaculate Conception","name_local":"Imaculada Conceição","type":"Nacional","category":"national","notes":""},
{"year":2027,"country":"Portugal","city":"Lisboa","date":"2027-12-25","name_en":"Christmas Day","name_local":"Natal","type":"Nacional","category":"national","notes":"⚠ Sábado"}];
const COUNTRIES = {'België/Belgique':'BE','España':'ES','France':'FR','Italia':'IT','Nederland':'NL','Portugal':'PT'};
const COUNTRY_LABELS = {ES:'Spain',FR:'France',PT:'Portugal',IT:'Italy',NL:'Netherlands',BE:'Belgium'};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; const DAYSHORT=['Mo','Tu','We','Th','Fr','Sa','Su'];
let selectedYear=2026,currentView='calendar',selectedCities=new Set([...new Set(HOLIDAYS.map(h=>h.city))]);
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const flag=cc=>`<img src="https://flagcdn.com/16x12/${String(cc).toLowerCase()}.png" width="16" height="12" style="vertical-align:-1px;border-radius:2px;margin-right:5px" alt="${cc}">`;
const cityCountry=Object.fromEntries(HOLIDAYS.map(h=>[h.city,COUNTRIES[h.country]||'XX']));
let lastScrollY = window.scrollY;
function setFiltersCollapsed(collapsed){document.body.classList.toggle('filters-collapsed', collapsed); const btn=$('filterToggle'); if(btn){btn.setAttribute('aria-expanded', String(!collapsed)); btn.textContent = collapsed ? '▾ Show filters' : '▴ Hide filters';}}
function toggleFilters(){setFiltersCollapsed(!document.body.classList.contains('filters-collapsed'));}
window.addEventListener('scroll',()=>{const y=window.scrollY; if(y>70 && y>lastScrollY+4) setFiltersCollapsed(true); if(y<20) setFiltersCollapsed(false); lastScrollY=y;},{passive:true});
function init(){ Object.entries(COUNTRY_LABELS).forEach(([cc,name])=>{ const o=document.createElement('option'); o.value=cc; o.innerHTML=name; $('countryFilter').appendChild(o); }); renderCities(); render(); }
function visibleCities(){ const cf=$('countryFilter').value; return [...new Set(HOLIDAYS.filter(h=>cf==='all'||COUNTRIES[h.country]===cf).map(h=>h.city))].sort(); }
function renderCities(){ const box=$('citySel'); box.innerHTML=''; visibleCities().forEach(city=>{ const cc=cityCountry[city]; const b=document.createElement('button'); b.className=`city-chip cc-${cc} ${selectedCities.has(city)?'selected':''}`; b.textContent=city; b.onclick=()=>{selectedCities.has(city)?selectedCities.delete(city):selectedCities.add(city); renderCities(); render();}; box.appendChild(b); }); $('cityCount').textContent=`${selectedCities.size} selected`; }
function selectAllVisible(){ visibleCities().forEach(c=>selectedCities.add(c)); renderCities(); render(); } function clearCities(){ selectedCities.clear(); renderCities(); render(); }
function setYear(y){ selectedYear=y; document.querySelectorAll('[data-year]').forEach(b=>b.classList.toggle('active',+b.dataset.year===y)); render(); }
function setView(v){ currentView=v; document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); $('viewCalendar').style.display=v==='calendar'?'grid':'none'; $('viewByDate').style.display=v==='bydate'?'grid':'none'; $('viewByCity').style.display=v==='bycity'?'grid':'none'; render(); }
function filtered(raw=false){ const q=$('searchBox').value.trim().toLowerCase(), cf=$('countryFilter').value, tf=$('typeFilter').value; return HOLIDAYS.filter(h=>h.year===selectedYear && selectedCities.has(h.city) && (cf==='all'||COUNTRIES[h.country]===cf) && (tf==='all'||h.category===tf) && (!q || [h.city,h.country,h.name_en,h.name_local,h.type,h.notes,h.category].join(' ').toLowerCase().includes(q))); }
function dedupe(rows){ const m=new Map(); rows.forEach(h=>{ const k=[h.date,h.name_en,h.category].join('|'); if(!m.has(k)) m.set(k,{...h,cities:[]}); if(!m.get(k).cities.includes(h.city)) m.get(k).cities.push(h.city); }); return [...m.values()].sort((a,b)=>a.date.localeCompare(b.date)); }
function dateObj(s){return new Date(s+'T12:00:00')} function isWeekend(s){const d=dateObj(s).getDay(); return d===0||d===6} function fmt(s){return dateObj(s).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'})}
function stats(rows,ds){ const dates=new Set(ds.map(h=>h.date)); $('statTotal').textContent=dates.size; $('statNational').textContent=ds.filter(h=>h.category==='national').length; $('statRegional').textContent=ds.filter(h=>h.category==='regional').length; $('statLocal').textContent=ds.filter(h=>h.category==='local').length; $('statWeekend').textContent=[...dates].filter(isWeekend).length; const today=new Date(); const next=ds.find(h=>dateObj(h.date)>=new Date(today.getFullYear(),today.getMonth(),today.getDate())); $('nextHoliday').innerHTML=next?`<div><b>Next selected holiday:</b> ${fmt(next.date)} · ${esc(next.name_en)} <span class="muted">(${esc(next.cities.join(', '))})</span></div><span class="badge ${next.category}">${next.category}</span>`:'<div><b>No upcoming selected holidays</b> for the current filter.</div>'; }
function render(){ const rows=filtered(); const ds=dedupe(rows); stats(rows,ds); if(currentView==='calendar') calendar(ds); if(currentView==='bydate') listByDate(rows); if(currentView==='bycity') listByCity(rows); }
function calendar(ds){ const by={}; ds.forEach(h=>(by[h.date]??=[]).push(h)); const grid=$('viewCalendar'); grid.innerHTML=''; for(let m=0;m<12;m++){ const count=Object.keys(by).filter(d=>+d.slice(5,7)===m+1).length; const card=document.createElement('section'); card.className='month-card'; card.innerHTML=`<div class="month-header"><span>${MONTHS[m]} ${selectedYear}</span><span class="month-count">${count||''}</span></div><div class="day-grid"></div>`; const dg=card.querySelector('.day-grid'); DAYSHORT.forEach((d,i)=>dg.insertAdjacentHTML('beforeend',`<div class="day-name">${d}</div>`)); const first=new Date(selectedYear,m,1).getDay(); const off=first===0?6:first-1; for(let i=0;i<off;i++) dg.insertAdjacentHTML('beforeend','<div class="day muted"></div>'); const days=new Date(selectedYear,m+1,0).getDate(); const today=new Date(); for(let d=1;d<=days;d++){ const s=`${selectedYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const hol=by[s]||[]; const el=document.createElement('div'); const dow=new Date(selectedYear,m,d).getDay(); el.className=`day ${dow===0||dow===6?'weekend':''} ${hol.length?'has':''} ${today.getFullYear()===selectedYear&&today.getMonth()===m&&today.getDate()===d?'today':''}`; el.innerHTML=`<div class="num">${d}</div>`+(hol.length?`<div class="dots">${hol.map(h=>`<span class="dot ${h.category}"></span>`).join('')}</div>`:''); if(hol.length){ el.onmouseenter=e=>showTip(e,s,hol); el.onmousemove=moveTip; el.onmouseleave=hideTip; } dg.appendChild(el); } grid.appendChild(card); } }
function group(rows,keyFn){return rows.reduce((a,h)=>{const k=keyFn(h);(a[k]??=[]).push(h);return a},{})}
function listByDate(rows){ const c=$('viewByDate'); if(!rows.length) return c.innerHTML='<div class="empty">No holidays match this filter.</div>'; const g=group(rows,h=>h.date.slice(0,7)); c.innerHTML=Object.keys(g).sort().map(k=>table(`${MONTHS[+k.slice(5)-1]} ${k.slice(0,4)}`,g[k].sort((a,b)=>a.date.localeCompare(b.date)||a.city.localeCompare(b.city)),true)).join(''); }
function listByCity(rows){ const c=$('viewByCity'); if(!rows.length) return c.innerHTML='<div class="empty">No holidays match this filter.</div>'; const g=group(rows,h=>h.city); c.innerHTML=Object.keys(g).sort().map(city=>{const cc=cityCountry[city]; return table(`${flag(cc)}${esc(city)} <span class="muted">(${cc})</span>`,g[city].sort((a,b)=>a.date.localeCompare(b.date)),false)}).join(''); }
function table(title,rows,showCity){ return `<section class="group"><h2>${title} <span class="muted">${rows.length}</span></h2><table><thead><tr><th>Date</th><th>Day</th>${showCity?'<th>City</th><th class="hide-sm">Country</th>':''}<th>Holiday</th><th class="hide-sm">Local name</th><th>Type</th></tr></thead><tbody>${rows.map(h=>{const d=dateObj(h.date), cc=COUNTRIES[h.country]||''; return `<tr><td class="date">${h.date}${isWeekend(h.date)?' ⚠':''}</td><td class="muted">${DAYS[d.getDay()]}</td>${showCity?`<td>${esc(h.city)}</td><td class="hide-sm">${flag(cc)}${esc(h.country)}</td>`:''}<td>${esc(h.name_en)}${h.notes?`<div class="muted">${esc(h.notes)}</div>`:''}</td><td class="muted hide-sm">${esc(h.name_local)}</td><td><span class="badge ${h.category}">${h.category}</span></td></tr>`}).join('')}</tbody></table></section>`; }
const tip=$('tooltip'); function showTip(e,date,hols){ tip.innerHTML=`<div class="tt-date">${dateObj(date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>`+hols.map(h=>`<div class="tt-item"><div class="tt-name">${esc(h.name_en)}</div><div class="tt-local">${esc(h.name_local)}</div><div><span class="badge ${h.category}">${h.category}</span></div><div class="tt-cities">📍 ${esc(h.cities.join(', '))}</div></div>`).join(''); tip.classList.add('visible'); moveTip(e); } function moveTip(e){ const x=e.clientX+14,y=e.clientY+14; tip.style.left=Math.min(x,innerWidth-tip.offsetWidth-12)+'px'; tip.style.top=Math.min(y,innerHeight-tip.offsetHeight-12)+'px'; } function hideTip(){tip.classList.remove('visible')}
init();
</script>
