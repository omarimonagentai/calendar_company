<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cooltra Holiday Calendar 2026–2027</title>

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23071d49'/%3E%3Crect x='10' y='14' width='44' height='40' rx='7' fill='white'/%3E%3Crect x='10' y='14' width='44' height='12' rx='7' fill='%230e5aa7'/%3E%3Ccircle cx='22' cy='20' r='3' fill='%23ffffff'/%3E%3Ccircle cx='42' cy='20' r='3' fill='%23ffffff'/%3E%3Ctext x='32' y='47' font-family='Arial,sans-serif' font-size='24' font-weight='700' fill='%23071d49' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E"
    />

    <style>
      :root {
        --ink: #102033;
        --muted: #667085;
        --line: #e5e7eb;
        --bg: #f6f8fb;
        --card: #fff;
        --brand: #071d49;
        --brand2: #0e5aa7;
        --national: #2563eb;
        --regional: #f97316;
        --local: #7c3aed;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
      }

      .hero {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 18px 28px;
        color: #fff;
        background: linear-gradient(135deg, #071d49, #0e5aa7);
        box-shadow: 0 8px 24px rgba(7, 29, 73, 0.25);
      }

      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        max-width: 1500px;
        margin: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 25px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 3px 0 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
      }

      .filter-toggle {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 13px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .filter-toggle:hover {
        background: rgba(255, 255, 255, 0.24);
      }

      .panel {
        display: grid;
        gap: 12px;
        max-width: 1500px;
        max-height: 520px;
        margin: 18px auto 0;
        padding: 14px;
        overflow: hidden;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.96);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        transition:
          max-height 0.25s ease,
          opacity 0.2s ease,
          transform 0.2s ease,
          margin 0.2s ease,
          padding 0.2s ease;
      }

      .filters-collapsed .panel {
        max-height: 0;
        margin-top: 0;
        padding-top: 0;
        padding-bottom: 0;
        border: 0;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px);
      }

      .filters-collapsed .hero {
        padding-bottom: 14px;
      }

      .filters-collapsed .subtitle {
        display: none;
      }

      .filters {
        display: grid;
        grid-template-columns: 220px 1fr 180px 170px;
        gap: 12px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .search,
      select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
      }

      .year-tabs,
      .view-tabs,
      .type-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pill,
      .smallbtn,
      .city-chip {
        cursor: pointer;
      }

      .pill {
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .pill.active {
        border-color: var(--brand);
        background: var(--brand);
        color: #fff;
      }

      .city-toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .smallbtn {
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-size: 12px;
        font-weight: 750;
      }

      .city-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        max-height: 106px;
        overflow: auto;
        padding: 3px 2px 1px;
      }

      .city-chip {
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: #344054;
        font-size: 12px;
        font-weight: 650;
      }

      .city-chip.selected {
        border-color: transparent;
        color: #fff;
      }

      .cc-ES.selected { background: #dc2626; }
      .cc-FR.selected { background: #2563eb; }
      .cc-PT.selected { background: #16a34a; }
      .cc-IT.selected { background: #ca8a04; }
      .cc-NL.selected { background: #ea580c; }
      .cc-BE.selected { background: #7c3aed; }

      .stats {
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 12px;
        max-width: 1500px;
        margin: 16px auto 0;
        padding: 0 28px;
      }

      .stat {
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
      }

      .stat strong {
        display: block;
        color: var(--brand);
        font-size: 25px;
      }

      .stat span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .nextbar {
        max-width: 1500px;
        margin: 14px auto 0;
        padding: 0 28px;
      }

      .next-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #dbeafe;
        border-left: 5px solid var(--brand2);
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
      }

      .next-card b {
        color: var(--brand);
      }

      .content {
        max-width: 1500px;
        margin: 16px auto;
        padding: 0 28px 28px;
      }

      .months-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
        gap: 16px;
      }

      .month-card,
      .group {
        overflow: hidden;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
      }

      .month-card {
        border-radius: 18px;
      }

      .month-header {
        display: flex;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        color: var(--brand);
        font-weight: 850;
      }

      .month-count {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .day-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        padding: 10px;
      }

      .day-name {
        padding-bottom: 4px;
        color: #98a2b3;
        font-size: 10px;
        font-weight: 800;
        text-align: center;
      }

      .day {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        min-height: 38px;
        padding: 4px;
        border-radius: 10px;
      }

      .day.weekend {
        background: #fafafa;
      }

      .day.today .num {
        display: grid;
        place-items: center;
        min-width: 21px;
        height: 21px;
        border-radius: 999px;
        background: var(--brand);
        color: #fff;
      }

      .num {
        color: #344054;
        font-size: 12px;
        font-weight: 800;
      }

      .day.muted .num {
        color: #cbd5e1;
      }

      .day.has {
        cursor: pointer;
        background: #f8fafc;
        outline: 1px solid #edf2f7;
      }

      .dots {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 2px;
      }

      .national { background: var(--national); }
      .regional { background: var(--regional); }
      .local { background: var(--local); }

      .list {
        display: grid;
        gap: 16px;
      }

      .group {
        border-radius: 16px;
      }

      .group h2 {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 12px 14px;
        background: #f8fafc;
        color: var(--brand);
        font-size: 15px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        color: #98a2b3;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-align: left;
        text-transform: uppercase;
      }

      td {
        padding: 10px 12px;
        border-bottom: 1px solid #f1f5f9;
        font-size: 13px;
        vertical-align: top;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      tr:hover td {
        background: #fbfdff;
      }

      .date {
        color: var(--brand);
        font-weight: 850;
        white-space: nowrap;
      }

      .muted {
        color: var(--muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        color: #fff;
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .badge.national { background: var(--national); }
      .badge.regional { background: var(--regional); }
      .badge.local { background: var(--local); }

      .empty {
        padding: 50px;
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        background: #fff;
        color: var(--muted);
        text-align: center;
      }

      .tooltip {
        position: fixed;
        z-index: 50;
        display: none;
        max-width: 360px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #101828;
        color: #fff;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        pointer-events: none;
      }

      .tooltip.visible {
        display: block;
      }

      .tt-date {
        margin-bottom: 7px;
        color: #98a2b3;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .tt-item {
        padding: 7px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .tt-name {
        font-weight: 850;
      }

      .tt-local,
      .tt-cities {
        margin-top: 5px;
        color: #cbd5e1;
        font-size: 12px;
      }

      .tt-local {
        margin-top: 2px;
        font-style: italic;
      }

      @media (max-width: 900px) {
        .hero {
          position: sticky;
          padding: 14px 16px;
        }

        .hero-top {
          align-items: center;
        }

        .brand {
          min-width: 0;
        }

        .logo {
          width: 40px;
          height: 40px;
        }

        .filter-toggle {
          padding: 8px 11px;
        }

        .panel {
          margin-top: 14px;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: repeat(2, 1fr);
          padding: 0 16px;
        }

        .content,
        .nextbar {
          padding-right: 16px;
          padding-left: 16px;
        }

        .months-grid {
          grid-template-columns: 1fr;
        }

        td,
        th {
          padding: 9px 8px;
          font-size: 12px;
        }

        .hide-sm {
          display: none;
        }
      }

      @media print {
        .hero,
        .stats,
        .nextbar {
          box-shadow: none;
        }

        .panel {
          display: none;
        }

        .content {
          padding: 0;
        }

        .month-card,
        .group {
          break-inside: avoid;
        }

        body {
          background: #fff;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <div class="logo">📅</div>
            <div>
              <h1>Cooltra Holiday Calendar</h1>
              <p class="subtitle">
                18 cities · 6 countries · 2026–2027 · operational holiday planning
              </p>
            </div>
          </div>

          <button
            id="filterToggle"
            class="filter-toggle"
            onclick="toggleFilters()"
            aria-expanded="true"
          >
            ▴ Hide filters
          </button>
        </div>

        <div class="panel">
          <div class="filters">
            <div class="field">
              <label>Year</label>
              <div class="year-tabs">
                <button class="pill active" data-year="2026" onclick="setYear(2026)">
                  2026
                </button>
                <button class="pill" data-year="2027" onclick="setYear(2027)">
                  2027
                </button>
              </div>
            </div>

            <div class="field">
              <label>Search holiday / city / country</label>
              <input
                id="searchBox"
                class="search"
                placeholder="e.g. Barcelona, Easter, local…"
                oninput="render()"
              />
            </div>

            <div class="field">
              <label>Country</label>
              <select id="countryFilter" onchange="renderCities(); render()">
                <option value="all">All countries</option>
              </select>
            </div>

            <div class="field">
              <label>Type</label>
              <select id="typeFilter" onchange="render()">
                <option value="all">All types</option>
                <option value="national">National</option>
                <option value="regional">Regional</option>
                <option value="local">Local</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Cities</label>
            <div class="city-toolbar">
              <button class="smallbtn" onclick="selectAllVisible()">Select visible</button>
              <button class="smallbtn" onclick="clearCities()">Clear</button>
              <span class="muted" id="cityCount"></span>
            </div>
            <div class="city-selector" id="citySel"></div>
          </div>

          <div class="field">
            <label>View</label>
            <div class="view-tabs">
              <button class="pill active" data-view="calendar" onclick="setView('calendar')">
                Calendar
              </button>
              <button class="pill" data-view="bydate" onclick="setView('bydate')">
                By date
              </button>
              <button class="pill" data-view="bycity" onclick="setView('bycity')">
                By city
              </button>
            </div>
          </div>
        </div>
      </header>

      <section class="stats">
        <div class="stat"><strong id="statTotal">—</strong><span>unique dates</span></div>
        <div class="stat"><strong id="statNational">—</strong><span>national</span></div>
        <div class="stat"><strong id="statRegional">—</strong><span>regional</span></div>
        <div class="stat"><strong id="statLocal">—</strong><span>local</span></div>
        <div class="stat"><strong id="statWeekend">—</strong><span>on weekend</span></div>
      </section>

      <section class="nextbar">
        <div class="next-card" id="nextHoliday">—</div>
      </section>

      <main class="content">
        <div id="viewCalendar" class="months-grid"></div>
        <div id="viewByDate" class="list" style="display: none"></div>
        <div id="viewByCity" class="list" style="display: none"></div>
      </main>

      <div class="tooltip" id="tooltip"></div>
    </div>

    <script>
      let HOLIDAYS;
      let COUNTRIES;
      let COUNTRY_LABELS;

      const MONTHS = [
        'January',
        'February',
        'March',
        'April',
        'May',
        'June',
        'July',
        'August',
        'September',
        'October',
        'November',
        'December',
      ];

      const DAYS = [
        'Sunday',
        'Monday',
        'Tuesday',
        'Wednesday',
        'Thursday',
        'Friday',
        'Saturday',
      ];

      const DAYSHORT = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];

      let selectedYear = 2026;
      let currentView = 'calendar';
      let selectedCities = new Set();
      let cityCountry = {};
      let lastScrollY = window.scrollY;

      const $ = id => document.getElementById(id);

      const esc = value =>
        String(value ?? '').replace(/[&<>"]/g, char => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
        }[char]));

      const flag = countryCode => `
        <img
          src="https://flagcdn.com/16x12/${String(countryCode).toLowerCase()}.png"
          width="16"
          height="12"
          style="vertical-align:-1px;border-radius:2px;margin-right:5px"
          alt="${countryCode}"
        >
      `;

      const tooltip = $('tooltip');

      function setFiltersCollapsed(collapsed) {
        document.body.classList.toggle('filters-collapsed', collapsed);

        const button = $('filterToggle');
        if (!button) return;

        button.setAttribute('aria-expanded', String(!collapsed));
        button.textContent = collapsed ? '▾ Show filters' : '▴ Hide filters';
      }

      function toggleFilters() {
        setFiltersCollapsed(!document.body.classList.contains('filters-collapsed'));
      }

      window.addEventListener(
        'scroll',
        () => {
          const y = window.scrollY;

          if (y > 70 && y > lastScrollY + 4) {
            setFiltersCollapsed(true);
          }

          if (y < 20) {
            setFiltersCollapsed(false);
          }

          lastScrollY = y;
        },
        { passive: true }
      );

      function init() {
        selectedCities = new Set([...new Set(HOLIDAYS.map(holiday => holiday.city))]);
        cityCountry = Object.fromEntries(
          HOLIDAYS.map(holiday => [holiday.city, COUNTRIES[holiday.country] || 'XX'])
        );

        Object.entries(COUNTRY_LABELS).forEach(([countryCode, countryName]) => {
          const option = document.createElement('option');
          option.value = countryCode;
          option.innerHTML = countryName;
          $('countryFilter').appendChild(option);
        });

        renderCities();
        render();
      }

      function visibleCities() {
        const countryFilter = $('countryFilter').value;

        return [...new Set(
          HOLIDAYS
            .filter(holiday => countryFilter === 'all' || COUNTRIES[holiday.country] === countryFilter)
            .map(holiday => holiday.city)
        )].sort();
      }

      function renderCities() {
        const container = $('citySel');
        container.innerHTML = '';

        visibleCities().forEach(city => {
          const countryCode = cityCountry[city];
          const button = document.createElement('button');

          button.className = `city-chip cc-${countryCode} ${selectedCities.has(city) ? 'selected' : ''}`;
          button.textContent = city;
          button.onclick = () => {
            if (selectedCities.has(city)) {
              selectedCities.delete(city);
            } else {
              selectedCities.add(city);
            }

            renderCities();
            render();
          };

          container.appendChild(button);
        });

        $('cityCount').textContent = `${selectedCities.size} selected`;
      }

      function selectAllVisible() {
        visibleCities().forEach(city => selectedCities.add(city));
        renderCities();
        render();
      }

      function clearCities() {
        selectedCities.clear();
        renderCities();
        render();
      }

      function setYear(year) {
        selectedYear = year;

        document
          .querySelectorAll('[data-year]')
          .forEach(button => button.classList.toggle('active', Number(button.dataset.year) === year));

        render();
      }

      function setView(view) {
        currentView = view;

        document
          .querySelectorAll('[data-view]')
          .forEach(button => button.classList.toggle('active', button.dataset.view === view));

        $('viewCalendar').style.display = view === 'calendar' ? 'grid' : 'none';
        $('viewByDate').style.display = view === 'bydate' ? 'grid' : 'none';
        $('viewByCity').style.display = view === 'bycity' ? 'grid' : 'none';

        render();
      }

      function filtered() {
        const query = $('searchBox').value.trim().toLowerCase();
        const countryFilter = $('countryFilter').value;
        const typeFilter = $('typeFilter').value;

        return HOLIDAYS.filter(holiday => {
          const searchableText = [
            holiday.city,
            holiday.country,
            holiday.name_en,
            holiday.name_local,
            holiday.type,
            holiday.notes,
            holiday.category,
          ]
            .join(' ')
            .toLowerCase();

          return (
            holiday.year === selectedYear &&
            selectedCities.has(holiday.city) &&
            (countryFilter === 'all' || COUNTRIES[holiday.country] === countryFilter) &&
            (typeFilter === 'all' || holiday.category === typeFilter) &&
            (!query || searchableText.includes(query))
          );
        });
      }

      function dedupe(rows) {
        const map = new Map();

        rows.forEach(holiday => {
          const key = [holiday.date, holiday.name_en, holiday.category].join('|');

          if (!map.has(key)) {
            map.set(key, { ...holiday, cities: [] });
          }

          if (!map.get(key).cities.includes(holiday.city)) {
            map.get(key).cities.push(holiday.city);
          }
        });

        return [...map.values()].sort((a, b) => a.date.localeCompare(b.date));
      }

      function dateObj(dateString) {
        return new Date(`${dateString}T12:00:00`);
      }

      function isWeekend(dateString) {
        const day = dateObj(dateString).getDay();
        return day === 0 || day === 6;
      }

      function fmt(dateString) {
        return dateObj(dateString).toLocaleDateString('en-GB', {
          weekday: 'short',
          day: '2-digit',
          month: 'short',
        });
      }

      function updateStats(rows, dedupedRows) {
        const dates = new Set(dedupedRows.map(holiday => holiday.date));

        $('statTotal').textContent = dates.size;
        $('statNational').textContent = dedupedRows.filter(holiday => holiday.category === 'national').length;
        $('statRegional').textContent = dedupedRows.filter(holiday => holiday.category === 'regional').length;
        $('statLocal').textContent = dedupedRows.filter(holiday => holiday.category === 'local').length;
        $('statWeekend').textContent = [...dates].filter(isWeekend).length;

        const today = new Date();
        const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const nextHoliday = dedupedRows.find(holiday => dateObj(holiday.date) >= todayStart);

        $('nextHoliday').innerHTML = nextHoliday
          ? `
            <div>
              <b>Next selected holiday:</b>
              ${fmt(nextHoliday.date)} · ${esc(nextHoliday.name_en)}
              <span class="muted">(${esc(nextHoliday.cities.join(', '))})</span>
            </div>
            <span class="badge ${nextHoliday.category}">${nextHoliday.category}</span>
          `
          : '<div><b>No upcoming selected holidays</b> for the current filter.</div>';
      }

      function render() {
        const rows = filtered();
        const dedupedRows = dedupe(rows);

        updateStats(rows, dedupedRows);

        if (currentView === 'calendar') calendar(dedupedRows);
        if (currentView === 'bydate') listByDate(rows);
        if (currentView === 'bycity') listByCity(rows);
      }

      function calendar(dedupedRows) {
        const holidaysByDate = {};

        dedupedRows.forEach(holiday => {
          holidaysByDate[holiday.date] ??= [];
          holidaysByDate[holiday.date].push(holiday);
        });

        const grid = $('viewCalendar');
        grid.innerHTML = '';

        for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
          const holidayCount = Object.keys(holidaysByDate).filter(
            date => Number(date.slice(5, 7)) === monthIndex + 1
          ).length;

          const card = document.createElement('section');
          card.className = 'month-card';
          card.innerHTML = `
            <div class="month-header">
              <span>${MONTHS[monthIndex]} ${selectedYear}</span>
              <span class="month-count">${holidayCount || ''}</span>
            </div>
            <div class="day-grid"></div>
          `;

          const dayGrid = card.querySelector('.day-grid');

          DAYSHORT.forEach(day => {
            dayGrid.insertAdjacentHTML('beforeend', `<div class="day-name">${day}</div>`);
          });

          const firstDay = new Date(selectedYear, monthIndex, 1).getDay();
          const offset = firstDay === 0 ? 6 : firstDay - 1;

          for (let i = 0; i < offset; i++) {
            dayGrid.insertAdjacentHTML('beforeend', '<div class="day muted"></div>');
          }

          const daysInMonth = new Date(selectedYear, monthIndex + 1, 0).getDate();
          const today = new Date();

          for (let dayNumber = 1; dayNumber <= daysInMonth; dayNumber++) {
            const dateString = `${selectedYear}-${String(monthIndex + 1).padStart(2, '0')}-${String(dayNumber).padStart(2, '0')}`;
            const holidays = holidaysByDate[dateString] || [];
            const dayOfWeek = new Date(selectedYear, monthIndex, dayNumber).getDay();
            const element = document.createElement('div');

            element.className = `day ${dayOfWeek === 0 || dayOfWeek === 6 ? 'weekend' : ''} ${holidays.length ? 'has' : ''} ${
              today.getFullYear() === selectedYear &&
              today.getMonth() === monthIndex &&
              today.getDate() === dayNumber
                ? 'today'
                : ''
            }`;

            element.innerHTML = `
              <div class="num">${dayNumber}</div>
              ${
                holidays.length
                  ? `<div class="dots">${holidays
                      .map(holiday => `<span class="dot ${holiday.category}"></span>`)
                      .join('')}</div>`
                  : ''
              }
            `;

            if (holidays.length) {
              element.onmouseenter = event => showTip(event, dateString, holidays);
              element.onmousemove = moveTip;
              element.onmouseleave = hideTip;
            }

            dayGrid.appendChild(element);
          }

          grid.appendChild(card);
        }
      }

      function group(rows, keyFn) {
        return rows.reduce((accumulator, holiday) => {
          const key = keyFn(holiday);
          accumulator[key] ??= [];
          accumulator[key].push(holiday);
          return accumulator;
        }, {});
      }

      function listByDate(rows) {
        const container = $('viewByDate');

        if (!rows.length) {
          container.innerHTML = '<div class="empty">No holidays match this filter.</div>';
          return;
        }

        const groupedRows = group(rows, holiday => holiday.date.slice(0, 7));

        container.innerHTML = Object.keys(groupedRows)
          .sort()
          .map(key =>
            table(
              `${MONTHS[Number(key.slice(5)) - 1]} ${key.slice(0, 4)}`,
              groupedRows[key].sort((a, b) => a.date.localeCompare(b.date) || a.city.localeCompare(b.city)),
              true
            )
          )
          .join('');
      }

      function listByCity(rows) {
        const container = $('viewByCity');

        if (!rows.length) {
          container.innerHTML = '<div class="empty">No holidays match this filter.</div>';
          return;
        }

        const groupedRows = group(rows, holiday => holiday.city);

        container.innerHTML = Object.keys(groupedRows)
          .sort()
          .map(city => {
            const countryCode = cityCountry[city];
            return table(
              `${flag(countryCode)}${esc(city)} <span class="muted">(${countryCode})</span>`,
              groupedRows[city].sort((a, b) => a.date.localeCompare(b.date)),
              false
            );
          })
          .join('');
      }

      function table(title, rows, showCity) {
        return `
          <section class="group">
            <h2>${title} <span class="muted">${rows.length}</span></h2>
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Day</th>
                  ${showCity ? '<th>City</th><th class="hide-sm">Country</th>' : ''}
                  <th>Holiday</th>
                  <th class="hide-sm">Local name</th>
                  <th>Type</th>
                </tr>
              </thead>
              <tbody>
                ${rows
                  .map(holiday => {
                    const date = dateObj(holiday.date);
                    const countryCode = COUNTRIES[holiday.country] || '';

                    return `
                      <tr>
                        <td class="date">${holiday.date}${isWeekend(holiday.date) ? ' ⚠' : ''}</td>
                        <td class="muted">${DAYS[date.getDay()]}</td>
                        ${
                          showCity
                            ? `<td>${esc(holiday.city)}</td><td class="hide-sm">${flag(countryCode)}${esc(holiday.country)}</td>`
                            : ''
                        }
                        <td>
                          ${esc(holiday.name_en)}
                          ${holiday.notes ? `<div class="muted">${esc(holiday.notes)}</div>` : ''}
                        </td>
                        <td class="muted hide-sm">${esc(holiday.name_local)}</td>
                        <td><span class="badge ${holiday.category}">${holiday.category}</span></td>
                      </tr>
                    `;
                  })
                  .join('')}
              </tbody>
            </table>
          </section>
        `;
      }

      function showTip(event, date, holidays) {
        tooltip.innerHTML = `
          <div class="tt-date">
            ${dateObj(date).toLocaleDateString('en-GB', {
              weekday: 'long',
              day: 'numeric',
              month: 'long',
              year: 'numeric',
            })}
          </div>
          ${holidays
            .map(holiday => `
              <div class="tt-item">
                <div class="tt-name">${esc(holiday.name_en)}</div>
                <div class="tt-local">${esc(holiday.name_local)}</div>
                <div><span class="badge ${holiday.category}">${holiday.category}</span></div>
                <div class="tt-cities">📍 ${esc(holiday.cities.join(', '))}</div>
              </div>
            `)
            .join('')}
        `;

        tooltip.classList.add('visible');
        moveTip(event);
      }

      function moveTip(event) {
        const x = event.clientX + 14;
        const y = event.clientY + 14;

        tooltip.style.left = `${Math.min(x, innerWidth - tooltip.offsetWidth - 12)}px`;
        tooltip.style.top = `${Math.min(y, innerHeight - tooltip.offsetHeight - 12)}px`;
      }

      function hideTip() {
        tooltip.classList.remove('visible');
      }

      fetch('holidays.json')
        .then(response => response.json())
        .then(data => {
          HOLIDAYS = data.holidays;
          COUNTRIES = data.countries;
          COUNTRY_LABELS = data.countryLabels;
          init();
        })
        .catch(error => {
          document.querySelector('.content').innerHTML = `
            <div class="empty">⚠ Error loading holidays.json: ${error.message}</div>
          `;
        });
    </script>
  </body>
</html>
